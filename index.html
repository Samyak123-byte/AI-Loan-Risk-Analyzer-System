<!DOCTYPE html>
<html>
<head>
    <title>AI Loan Risk Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <h2>🏦 SecureTrust AI Banking</h2>
    <div>
        <a href="/dashboard" class="logout">Dashboard</a>
        <a href="/logout" class="logout">Logout</a>
    </div>
</div>

<div class="container">

    <div class="card">
        <h1>Loan Approval System</h1>

        <form action="/predict" method="post">

            <div class="form-grid">

                <div class="input-box">
                    <label>Gender</label>
                    <select name="gender">
                        <option value="1">Male</option>
                        <option value="0">Female</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Married</label>
                    <select name="married">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Age</label>
                    <input type="number" name="age" min="18" max="70" required>
                </div>

                <div class="input-box">
                    <label>Employment</label>
                    <select name="employment">
                        <option value="0">Salaried</option>
                        <option value="1">Self Employed</option>
                        <option value="2">Business</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Property Area</label>
                    <select name="property_area">
                        <option value="0">Rural</option>
                        <option value="1">Semiurban</option>
                        <option value="2">Urban</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Income</label>
                    <input type="number" name="income" placeholder="Enter monthly income" min="1000" required>
                </div>

                <div class="input-box">
                    <label>Loan Amount</label>
                    <input type="number" name="loan_amount" placeholder="Enter loan amount" min="10" required>
                </div>

                <div class="input-box">
                    <label>Credit History</label>
                    <select name="credit_history">
                        <option value="1">Good</option>
                        <option value="0">Bad</option>
                    </select>
                </div>

            </div>

            <button class="btn">Predict Loan</button>

        </form>

        <!-- RESULT -->
        {% if prediction_text %}
        <div class="result {{ 'success' if 'Approved' in prediction_text else 'reject' }}">
            <h2>{{ prediction_text }}</h2>
            <p>{{ prob_text }}</p>
            <p><b>Reason:</b> {{ reason_text }}</p>
        </div>
        {% endif %}

    </div>

</div>

</body>
</html>


<!-- 🔥 CHATBOT -->
<div class="chatbot">
    <h3>🤖 Loan Assistant</h3>

    <div id="chatbox"></div>

    <input type="text" id="userInput" placeholder="Ask about loan..." />
    <button onclick="sendMessage()">Send</button>
</div>


<script>
function sendMessage() {
    let input = document.getElementById("userInput");
    let message = input.value;

    if (!message) return;

    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += "<p><b>You:</b> " + message + "</p>";

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: message })
    })
    .then(res => res.json())
    .then(data => {
        chatbox.innerHTML += "<p><b>Bot:</b> " + data.reply + "</p>";
        chatbox.scrollTop = chatbox.scrollHeight;
    });

    input.value = "";
}
</script>
